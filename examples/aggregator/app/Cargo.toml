[package]
name = "aggregator-app"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
sails = { workspace = true, features = ["gstd-panic-message"] }
demo-client = { path = "../../demo/client" }
redirect-client = { path = "../../redirect/client" }
futures = { workspace = true }

[build-dependencies]
sails = { workspace = true, features = ["wasm-builder"] }

[dev-dependencies]
demo = { path = "../../demo/app" }
redirect-app = { path = "../../redirect/app" }
aggregator-client = { path = "../client" }
sails = { workspace = true, features = ["gtest"] }
tokio = { workspace = true, features = ["rt", "macros"] }
