[package]
name = "sails-cli"
description = "CLI tools the Sails framework"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[package.metadata.dist]
dist = true

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/rs%2Fv{ version }/{ name }-{ target }{ archive-suffix }"

[package.metadata.binstall.overrides.x86_64-pc-windows-msvc]
pkg-fmt = "zip"

[[bin]]
name = "cargo-sails"
path = "src/main.rs"

[dependencies]
# sails
sails-client-gen.workspace = true
sails-client-gen-js.workspace = true
sails-idl-embed.workspace = true
sails-sol-gen.workspace = true

# other
anyhow.workspace = true
askama = { workspace = true, features = ["derive", "std"] }
cargo_metadata.workspace = true
clap = { workspace = true, features = ["derive"] }
convert_case.workspace = true
rustdoc-types.workspace = true
serde-json = { workspace = true, features = ["std"] }
toml_edit.workspace = true
