name: '[outdated][net] Test Report'

on:
# Outdated workflow
# workflow_run:
#   workflows:
#     - '[net] CI (.Net)'
#   types:
#     - completed
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test-report:
    if: false
    name: Generate Test Report
    runs-on: ubuntu-latest

    steps:
      - name: Generate Test Report
        uses: dorny/test-reporter@v1
        with:
          artifact: test-results
          name: .Net Tests
          path: '*.trx'
          reporter: dotnet-trx
